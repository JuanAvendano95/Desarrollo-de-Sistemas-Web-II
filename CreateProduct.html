<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Best Store - New Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-5">New Product</h2>
        
        <form th:action="@{/products/create}" method="post" enctype="multipart/form-data" th:object="${productDto}">
            
            <div class="mb-3">
                <label>Description</label>
                <textarea class="form-control" th:field="*{description}"></textarea>
            </div>

            <div class="mb-3">
                <label>Price</label>
                <input type="number" step="0.01" class="form-control" th:field="*{price}">
            </div>

            <div class="mb-3">
                <label>Amount</label>
                <input type="number" class="form-control" th:field="*{amount}">
            </div>

            <div class="mb-3">
                <label>Category</label>
                <select class="form-select" th:field="*{categoryId}">
                    <option value="0">Elige la Categoria</option>
                    <option th:each="category : ${categories}" 
                            th:value="${category.id}" 
                            th:text="${category.description}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label>Mark</label>
                <select class="form-select" th:field="*{markId}">
                    <option value="0">Elige la Marca</option>
                    <option th:each="mark : ${marks}" 
                            th:value="${mark.id}" 
                            th:text="${mark.description}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label>Image</label>
                <input type="file" class="form-control" th:field="*{imageFile}">
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
            <a href="/products" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
