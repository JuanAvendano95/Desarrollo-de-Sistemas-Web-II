<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Galería | Tienda Sara</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card { transition: transform 0.3s; height: 100%; position: relative; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-img-top { height: 200px; object-fit: contain; padding: 15px; background-color: #fff; }
        .badge-tag { z-index: 10; top: 10px; left: 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark sticky-top"><div class="container"><a class="navbar-brand" href="index.html">🛒 Tienda Sara</a></div></nav>

    <main class="container my-5">
        <div class="row">
            <aside class="col-lg-3">
                <h5>Filtros</h5>
                <select id="catFilter" class="form-select mb-3" onchange="currentPage=1; update()">
                    <option value="all">Todas</option>
                    <option value="elec">Electrónica</option>
                    <option value="hogar">Hogar</option>
                    <option value="dep">Deportes</option>
                </select>
                <select id="sortOrder" class="form-select" onchange="currentPage=1; update()">
                    <option value="default">Relevancia</option>
                    <option value="low">Precio: Menor a Mayor</option>
                    <option value="high">Precio: Mayor a Menor</option>
                </select>
            </aside>
            <section class="col-lg-9">
                <div id="product-grid" class="row row-cols-1 row-cols-md-3 g-4"></div>
                <nav class="mt-5"><ul id="pagination" class="pagination justify-content-center"></ul></nav>
            </section>
        </div>
    </main>

    <script>
        const productos = [
            { id: 1, name: "Tenis Deportivos", price: 1200, cat: "dep", img: "img/dep_tenis.jpg", tag: "Nuevo" },
            { id: 2, name: "Set de Pesas", price: 800, cat: "dep", img: "img/dep_pesas.jpg", tag: "Descuento" },
            { id: 3, name: "Balón Profesional", price: 450, cat: "dep", img: "img/dep_balon.jpg", tag: "Popular" },
            { id: 4, name: "Silla de Oficina", price: 2500, cat: "hogar", img: "img/hogar_silla.jpg", tag: "Nuevo" },
            { id: 5, name: "Lámpara LED", price: 300, cat: "hogar", img: "img/hogar_lampara.jpg", tag: "" },
            { id: 6, name: "Licuadora Pro", price: 900, cat: "hogar", img: "img/hogar_licuadora.jpg", tag: "Popular" },
            { id: 7, name: "Audífonos BT", price: 900, cat: "elec", img: "img/elec_audifonos.jpg", tag: "Descuento" },
            { id: 8, name: "Laptop Gamer", price: 18000, cat: "elec", img: "img/elec_laptop.jpg", tag: "Nuevo" },
            { id: 9, name: "Smartphone Pro", price: 6500, cat: "elec", img: "img/elec_smartphone.jpg", tag: "Popular" }
        ];

        let currentPage = 1;
        const itemsPerPage = 6;

        function agregarAlCarrito(p) {
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            let item = carrito.find(i => i.id === p.id);
            if (item) item.qty += 1; else { p.qty = 1; carrito.push(p); }
            localStorage.setItem('carrito', JSON.stringify(carrito));
            alert(p.name + " agregado al carrito");
        }

        function render(lista) {
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedItems = lista.slice(startIndex, startIndex + itemsPerPage);
            const grid = document.getElementById('product-grid');
            
            grid.innerHTML = paginatedItems.map(p => `
                <div class="col">
                    <div class="card product-card">
                        ${p.tag ? `<span class="badge bg-danger position-absolute m-2 badge-tag">${p.tag}</span>` : ''}
                        <img src="${p.img}" class="card-img-top">
                        <div class="card-body">
                            <h5>${p.name}</h5><p class="fw-bold">$${p.price}</p>
                            <button class="btn btn-primary w-100" onclick='agregarAlCarrito(${JSON.stringify(p)})'>Agregar al carrito</button>
                        </div>
                    </div>
                </div>`).join('');

            const totalPages = Math.ceil(lista.length / itemsPerPage);
            const pagUI = document.getElementById('pagination');
            pagUI.innerHTML = '';
            for(let i = 1; i <= totalPages; i++) {
                pagUI.innerHTML += `<li class="page-item ${currentPage === i ? 'active' : ''}"><button class="page-link" onclick="currentPage=${i}; update()">${i}</button></li>`;
            }
        }

        function update() {
            let filtered = [...productos];
            const cat = document.getElementById('catFilter').value;
            const sort = document.getElementById('sortOrder').value;
            if (cat !== 'all') filtered = filtered.filter(p => p.cat === cat);
            if (sort === 'low') filtered.sort((a, b) => a.price - b.price);
            if (sort === 'high') filtered.sort((a, b) => b.price - a.price);
            render(filtered);
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if(params.get('cat')) document.getElementById('catFilter').value = params.get('cat');
            update();
        };
    </script>
</body>
</html>
